<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — ERP Workflow Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <p class="login-logo">DIDSBURY ENGINEERING</p>
        <h1 class="login-title">ERP Workflow<br>Extension</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}" style="margin-bottom:16px">{{ msg }}</div>
        {% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="field" style="margin-bottom:16px">
                <label>USERNAME</label>
                <select name="username">
                    <option value="">— select demo user —</option>
                    <option value="niv">niv — Nivedita Saha (Developer)</option>
                    <option value="manager">manager — James Holroyd (Manager / Approver)</option>
                    <option value="buyer">buyer — Rachel Osei (Buyer)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Sign In →</button>
        </form>
        <p class="login-footer" style="text-align:center">ERP Workflow Extension Prototype · Flask + SQLite<br>Simulating EFACS-style extension patterns</p>
    </div>
</div>
</body>
</html>
